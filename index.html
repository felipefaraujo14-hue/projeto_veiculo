<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de veículos</title>

    <link rel="stylesheet" href="css/style_veiculo.css">
</head>
<body>

    <div class="container">

        <h1>Cadastro de veículos</h1>

        <form id="formVeiculo">

            <label>Marca</label>
            <input type="text" id="marca" required>
            <label>Modelo</label>
            <input type="text" id="modelo" required>
            <label>Placa</label>
            <input type="text" id="placa" required>
            <label>Ano de fabricação</label>
            <input type="number" id="ano" required>
            <label>Valor de mercado</label>
            <input type="number" id="valor" step="0.01" required>

            <h3>Tipo de combustível</h3>

            <label>
                <input type="radio" name="combustivel" value="Gasolina" required>
                Gasolina
            </label>

            <label>
                <input type="radio" name="combustivel" value="Etanol">
                Etanol
            </label>

            <label>
                <input type="radio" name="combustivel" value="GNV">
                GNV
            </label>

            <label>
                <input type="radio" name="combustivel" value="Diesel">
                Diesel
            </label>

            <br><br>

            <button type="submit">Adicionar</button>
            <button type="reset">Excluir</button>

        </form>

        <hr>
        <h2>Lista de veículos</h2>
        <div id="listaVeiculos"></div>

    </div>

    <script type="module" src="js/script_veiculo.js"></script>

</body>
</html>
